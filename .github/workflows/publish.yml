name: publish

# Publishes @rheopyrin/db-access-mcp to npm on every push to master
# (direct commits and PR merges are both pushes to master), plus a manual
# "Run workflow" button. It only actually publishes when the package.json
# version is NOT already on npm — so bump the version to cut a release; pushes
# without a bump run but skip publishing (npm forbids re-publishing a version).
#
# On a version bump it publishes to npm AND registers the server in the official
# MCP Registry (github-oidc auth — no extra secret; uses the workflow OIDC token).
#
# Setup required once in the repo:
#   Settings -> Secrets and variables -> Actions -> new secret NPM_TOKEN
#   (npm "Automation" access token with publish rights on the scope).
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org # writes .npmrc that reads NODE_AUTH_TOKEN

      - run: npm ci

      # Build up front so dist/cli.js exists when npm normalizes the bin field
      # (otherwise npm warns "No bin file found"). prepublishOnly rebuilds anyway.
      - run: npm run build

      # Publish only when this exact version is not on npm yet — avoids failing
      # on pushes/merges that don't bump package.json version.
      - id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "$NAME@$VERSION already published — skipping"
            echo "publish=false" >> "$GITHUB_OUTPUT"
          else
            echo "$NAME@$VERSION not published yet — will publish"
            echo "publish=true" >> "$GITHUB_OUTPUT"
          fi

      # prepublishOnly runs lint + typecheck + build + test before packing.
      # access=public comes from package.json publishConfig; --provenance needs id-token.
      - if: steps.check.outputs.publish == 'true'
        run: npm publish --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Official MCP Registry (only when a new npm version was just published) ---
      # The registry validates that the published npm package carries a matching
      # top-level "mcpName", so this must run AFTER npm publish.
      - name: Install mcp-publisher
        if: steps.check.outputs.publish == 'true'
        run: |
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz" \
            | tar -xz mcp-publisher
          sudo install -m 0755 mcp-publisher /usr/local/bin/mcp-publisher
        env:
          MCP_PUBLISHER_VERSION: v1.8.0

      # Keep server.json in sync with package.json so the two versions can't drift.
      - name: Stamp server.json version from package.json
        if: steps.check.outputs.publish == 'true'
        run: |
          node -e "const fs=require('fs');const v=require('./package.json').version;const s=require('./server.json');s.version=v;s.packages[0].version=v;fs.writeFileSync('server.json',JSON.stringify(s,null,2)+'\n')"

      - name: Publish to MCP Registry
        if: steps.check.outputs.publish == 'true'
        run: |
          mcp-publisher login github-oidc
          mcp-publisher publish
